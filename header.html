<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HEADER | E-COMMERCE WEBSITE</title>

    <link rel="icon" href="https://yt3.ggpht.com/a/AGF-l78km1YyNXmF0r3-0CycCA0HLA_i6zYn_8NZEg=s900-c-k-c0xffffffff-no-rj-mo" type="image/gif" sizes="16x16">

    <link rel="stylesheet" href="css/header.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href="https://fonts.googleapis.com/css?family=Lato&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <section>
        <div id="container">

            <!-- Logo -->
            <div id="shopName">
                <a href="index.html"><b>PRIME</b>CART</a>
            </div>

            <!-- Navigation -->
            <div id="collection">
                <div id="clothing">
                    <a href="clothing.html">CLOTHING</a>
                </div>
                <div id="accessories">
                    <a href="accessories.html">ACCESSORIES</a>
                </div>
            </div>

            <!-- Search Bar -->
            <div id="search">
                <i class="fa-solid fa-magnifying-glass search"></i>
                <input type="text" id="input" name="searchBox" placeholder="Search for Clothing and Accessories">
            </div>

            <!-- User Section -->
            <div id="user">
                <a href="cart.html">
                    <i class="fa-solid fa-cart-shopping addedToCart"></i>
                    <div id="badge">0</div>
                </a>

                <a href="#">
                    <i class="fa-solid fa-user userIcon"></i>
                </a>
            </div>

        </div>
    </section>
</header>

</body>
</html>
